<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ChartMaster — Aprende a ler gráficos</title>
<style>
  :root{
    --bg:#0E1320; --panel:#161D2E; --panel-2:#1C2438; --border:#243049;
    --text:#E7ECF5; --muted:#8B94AB;
    --green:#2EBD85; --red:#F6465D; --gold:#E8B33D; --gold-soft:rgba(232,179,61,.14);
    --radius:14px;
    --mono:"JetBrains Mono","SF Mono",ui-monospace,Menlo,Consolas,monospace;
    --sans:"Inter",-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);display:flex;justify-content:center}
  .app{width:100%;max-width:520px;height:100dvh;min-height:560px;display:flex;flex-direction:column;position:relative;overflow:hidden}

  /* ========== VIEWS ========== */
  .view{position:absolute;inset:0;display:none;flex-direction:column;padding:14px 16px 0;overflow:hidden}
  .view.active{display:flex}

  /* ========== HOME ========== */
  .home-head{display:flex;align-items:center;justify-content:space-between;padding-bottom:6px}
  .brand{font-weight:800;font-size:19px;letter-spacing:-.01em}
  .brand span{color:var(--gold)}
  .chips{display:flex;gap:8px}
  .chip{font-family:var(--mono);font-size:12px;padding:5px 10px;border-radius:99px;border:1px solid var(--border);background:var(--panel);color:var(--muted)}
  .chip.gold{color:var(--gold);border-color:rgba(232,179,61,.3);background:var(--gold-soft)}
  .level-line{font-size:12px;color:var(--muted);padding-bottom:10px}
  .level-line b{color:var(--text)}
  .lvl-bar{height:6px;background:var(--panel);border-radius:99px;margin-top:6px;overflow:hidden}
  .lvl-bar>div{height:100%;background:linear-gradient(90deg,var(--gold),#F5CE6E);border-radius:99px}

  .track{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:4px 2px 90px}
  .mod{
    display:flex;gap:14px;align-items:center;background:var(--panel);border:1.5px solid var(--border);
    border-radius:var(--radius);padding:14px;cursor:pointer;text-align:left;color:var(--text);
    font-family:var(--sans);transition:transform .06s,border-color .15s;width:100%;
  }
  .mod:active{transform:scale(.985)}
  .mod .ico{width:44px;height:44px;border-radius:12px;background:var(--panel-2);display:grid;place-items:center;font-size:21px;flex:none}
  .mod .info{flex:1;min-width:0}
  .mod .info h3{font-size:14.5px;margin-bottom:2px}
  .mod .info p{font-size:12px;color:var(--muted);line-height:1.35}
  .mod .st{font-family:var(--mono);font-size:11px;flex:none;text-align:right}
  .mod.avail{border-color:rgba(232,179,61,.45)}
  .mod.avail .st{color:var(--gold)}
  .mod.done .ico{background:rgba(46,189,133,.12)}
  .mod.done .st{color:var(--green)}
  .mod.locked{opacity:.45;cursor:not-allowed}
  .mod.locked .st{color:var(--muted)}
  .exam-link{display:inline-block;margin-top:6px;font-size:11px;color:var(--gold);background:var(--gold-soft);border:1px solid rgba(232,179,61,.3);border-radius:99px;padding:3px 9px;cursor:pointer}
  .daily-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .daily{display:flex;gap:10px;align-items:center;text-align:left;background:linear-gradient(135deg,var(--panel-2),var(--panel));border:1.5px solid rgba(232,179,61,.35);border-radius:var(--radius);padding:13px;cursor:pointer;color:var(--text);font-family:var(--sans);transition:transform .06s}
  .daily:active{transform:scale(.98)}
  .daily.done{opacity:.6;border-color:var(--border)}
  .daily .di{font-size:22px;flex:none}
  .daily h4{font-size:13px;margin-bottom:2px}
  .daily p{font-size:11px;color:var(--muted);line-height:1.3}

  /* ========== BOTTOM NAV ========== */
  .nav{
    position:absolute;left:0;right:0;bottom:0;display:flex;background:rgba(14,19,32,.92);
    backdrop-filter:blur(8px);border-top:1px solid var(--border);
    padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:15;
  }
  .nav button{flex:1;background:none;border:none;color:var(--muted);font-family:var(--sans);font-size:11px;cursor:pointer;display:flex;flex-direction:column;gap:3px;align-items:center}
  .nav button .nico{font-size:20px}
  .nav button.on{color:var(--gold)}

  /* ========== LESSON ========== */
  header.lh{display:flex;align-items:center;gap:12px;flex:none}
  .icon-btn{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;width:36px;height:36px;border-radius:10px;display:grid;place-items:center;flex:none}
  .icon-btn:hover{background:var(--panel)}
  .progress{flex:1;height:10px;background:var(--panel);border-radius:99px;overflow:hidden}
  .progress>div{height:100%;width:0%;border-radius:99px;background:linear-gradient(90deg,var(--gold),#F5CE6E);transition:width .45s cubic-bezier(.2,.8,.2,1)}
  .xp-pill{font-family:var(--mono);font-size:13px;color:var(--gold);background:var(--gold-soft);padding:5px 10px;border-radius:99px;flex:none;border:1px solid rgba(232,179,61,.25)}
  .lesson-tag{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:8px 2px 10px}
  .lesson-tag b{color:var(--text);letter-spacing:0;text-transform:none;font-size:13px;font-weight:600}

  .chart-card{position:relative;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;flex:none;margin-bottom:10px}
  .chart-head{display:flex;justify-content:space-between;padding:10px 14px 0;font-family:var(--mono);font-size:12px;color:var(--muted)}
  .chart-head .sym{color:var(--text);font-weight:600}
  canvas{display:block;width:100%;height:250px;touch-action:manipulation}
  canvas.clickable{cursor:crosshair}
  .hint-chip{position:absolute;top:36px;left:50%;transform:translateX(-50%);background:rgba(14,19,32,.85);border:1px solid var(--border);font-size:12px;color:var(--muted);padding:6px 12px;border-radius:99px;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap}
  .hint-chip.show{opacity:1}

  .question{font-size:16px;font-weight:600;line-height:1.45;padding:0 2px;flex:none}
  .question small{display:block;font-weight:400;color:var(--muted);font-size:13px;margin-top:4px}
  .options{display:flex;flex-direction:column;gap:9px;overflow-y:auto;flex:1;min-height:0;padding:10px 2px 8px}
  .opt{
    text-align:left;background:var(--panel);border:1.5px solid var(--border);color:var(--text);
    border-radius:var(--radius);padding:13px 15px;font-size:14px;line-height:1.4;cursor:pointer;
    font-family:var(--sans);transition:border-color .15s,background .15s,transform .06s;
    display:flex;gap:12px;align-items:center;
  }
  .opt .key{font-family:var(--mono);font-size:12px;color:var(--muted);border:1px solid var(--border);border-radius:8px;width:25px;height:25px;display:grid;place-items:center;flex:none}
  .opt:active{transform:scale(.985)}
  .opt.selected{border-color:var(--gold);background:var(--gold-soft)}
  .opt.selected .key{border-color:var(--gold);color:var(--gold)}
  .opt.correct{border-color:var(--green);background:rgba(46,189,133,.12)}
  .opt.wrong{border-color:var(--red);background:rgba(246,70,93,.10)}
  .opt:disabled{cursor:default;opacity:1}

  .cta{
    flex:none;border:none;border-radius:var(--radius);padding:15px;font-size:15px;font-weight:700;
    font-family:var(--sans);cursor:pointer;background:var(--gold);color:#1A1405;
    transition:opacity .2s,transform .06s;margin-bottom:calc(14px + env(safe-area-inset-bottom));
  }
  .cta:disabled{background:var(--panel-2);color:var(--muted);cursor:not-allowed}
  .cta:active:not(:disabled){transform:scale(.985)}
  .cta:focus-visible,.opt:focus-visible,.mod:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

  /* ========== FEEDBACK SHEET ========== */
  .sheet{position:fixed;left:0;right:0;bottom:0;display:flex;justify-content:center;transform:translateY(105%);transition:transform .35s cubic-bezier(.2,.9,.25,1);z-index:40}
  .sheet.show{transform:translateY(0)}
  .sheet-inner{width:100%;max-width:520px;margin:0 16px;border-radius:18px 18px 0 0;padding:18px 18px calc(18px + env(safe-area-inset-bottom));border:1px solid var(--border);border-bottom:none}
  .sheet-inner.ok{background:#10241D;border-color:rgba(46,189,133,.4)}
  .sheet-inner.bad{background:#2A1419;border-color:rgba(246,70,93,.4)}
  .sheet-title{display:flex;align-items:center;gap:10px;font-weight:800;font-size:16px;margin-bottom:6px}
  .sheet-title .badge{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-size:14px;flex:none}
  .ok .sheet-title{color:var(--green)}.ok .badge{background:var(--green);color:#06140E}
  .bad .sheet-title{color:var(--red)}.bad .badge{background:var(--red);color:#1E0509}
  .sheet-body{font-size:13.5px;line-height:1.55;opacity:.92;margin-bottom:12px}
  .sheet-xp{font-family:var(--mono);font-size:12px;color:var(--gold);margin-bottom:14px}
  /* --- Aprofundar (fonte/citação no feedback) --- */
  .deepen{margin-bottom:14px}
  .deepen-toggle{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);
    border-radius:10px;padding:10px 12px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;text-align:left;transition:background .15s}
  .deepen-toggle:hover{background:rgba(255,255,255,.09)}
  .deepen-toggle.open{border-color:var(--gold);color:var(--gold)}
  .deepen-body{margin-top:10px;padding:12px;background:rgba(0,0,0,.22);border:1px solid var(--border);border-radius:10px;font-size:12.5px;line-height:1.55}
  .deepen-body .cite{color:var(--muted);margin-bottom:10px}
  .deepen-body .cite b{color:var(--text)}
  .deepen-body .cite span{display:block;margin-top:4px;font-style:italic;color:var(--text);opacity:.85}
  .deepen-body .deep-link{display:inline-flex;align-items:center;gap:6px;color:var(--gold);text-decoration:none;font-weight:600;border:1px solid rgba(232,179,61,.35);background:var(--gold-soft);border-radius:99px;padding:7px 12px}
  .deepen-body .deep-link:hover{text-decoration:underline}
  /* --- Cartão continuar lição (memória) --- */
  .resume{display:flex;gap:12px;align-items:center;text-align:left;width:100%;cursor:pointer;
    background:linear-gradient(135deg,rgba(46,189,133,.16),var(--panel));border:1.5px solid rgba(46,189,133,.45);
    border-radius:var(--radius);padding:14px;color:var(--text);font-family:var(--sans);transition:transform .06s}
  .resume:active{transform:scale(.985)}
  .resume .ri{font-size:24px;flex:none}
  .resume .rinfo{flex:1;min-width:0}
  .resume h4{font-size:14px;margin-bottom:2px}
  .resume p{font-size:12px;color:var(--muted);margin-bottom:7px}
  .resume .rbar{height:6px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden}
  .resume .rbar>div{height:100%;background:var(--green);border-radius:99px}
  .sheet .cta{width:100%;margin-bottom:0}
  .ok .cta{background:var(--green);color:#06140E}
  .bad .cta{background:var(--red);color:#FFF}

  /* ========== RESULT ========== */
  .result{position:absolute;inset:0;background:var(--bg);z-index:30;display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:24px;text-align:center}
  .result.show{display:flex}
  .ring{position:relative;width:140px;height:140px;margin-bottom:6px}
  .ring svg{transform:rotate(-90deg)}
  .ring .val{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--mono);font-size:28px;font-weight:700}
  .result h2{font-size:21px}
  .result p{color:var(--muted);font-size:13.5px;max-width:310px;line-height:1.5}
  .result .stats{display:flex;gap:12px;margin:12px 0 4px}
  .stat{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:11px 18px;min-width:92px}
  .stat b{display:block;font-family:var(--mono);font-size:17px;color:var(--gold)}
  .stat span{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .result .cta{width:100%;max-width:300px;margin-top:10px;margin-bottom:0}
  .new-badge{font-size:13px;color:var(--gold);background:var(--gold-soft);border:1px solid rgba(232,179,61,.3);border-radius:99px;padding:6px 14px;margin-top:4px}

  /* ========== DASHBOARD ========== */
  .dash{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding:6px 2px 90px}
  .dash h2{font-size:17px}
  .dgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .dcard{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
  .dcard b{display:block;font-family:var(--mono);font-size:22px;color:var(--gold);margin-bottom:2px}
  .dcard span{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
  .sect{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:4px}
  .cbar{display:flex;align-items:center;gap:10px;font-size:12.5px}
  .cbar .nm{width:118px;flex:none;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cbar .tr{flex:1;height:8px;background:var(--panel);border-radius:99px;overflow:hidden;border:1px solid var(--border)}
  .cbar .tr>div{height:100%;border-radius:99px}
  .cbar .pc{width:38px;text-align:right;font-family:var(--mono);font-size:11px;color:var(--muted)}
  .badges{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .bdg{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:12px 8px;text-align:center}
  .bdg .bi{font-size:24px;display:block;margin-bottom:4px}
  .bdg .bn{font-size:10.5px;color:var(--muted);line-height:1.3}
  .sync{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;flex-direction:column;gap:10px}
  .sync-note{font-size:12px;color:var(--muted);line-height:1.5}
  .sync-note b{color:var(--text)}
  .sync-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .sync-btn{background:var(--panel-2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:11px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}
  .sync-btn:hover{background:rgba(255,255,255,.07)}
  .sync-box{width:100%;min-height:64px;resize:vertical;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--mono);font-size:11px;padding:10px;line-height:1.4}
  .sync-box:focus{outline:none;border-color:var(--gold)}
  .sync-apply{background:var(--green);color:#06140E;border:none;border-radius:10px;padding:11px;font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer}
  .bdg.earned{border-color:rgba(232,179,61,.4);background:var(--gold-soft)}
  .bdg.earned .bn{color:var(--text)}
  .bdg:not(.earned){opacity:.4;filter:grayscale(1)}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:18px;background:var(--panel);border-radius:var(--radius);border:1px dashed var(--border)}

  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div class="app">

  <!-- ============ HOME / TRILHA ============ -->
  <div class="view active" id="vHome">
    <div class="home-head">
      <div class="brand">Chart<span>Master</span></div>
      <div class="chips">
        <div class="chip">🔥 <span id="hStreak">1</span></div>
        <div class="chip gold" id="hXp">0 XP</div>
      </div>
    </div>
    <div class="level-line">
      Nível <b id="hLvl">1</b> · <b id="hTitle">Aprendiz</b>
      <div class="lvl-bar"><div id="hLvlBar" style="width:0%"></div></div>
    </div>
    <div class="track" id="track"></div>
  </div>

  <!-- ============ DASHBOARD ============ -->
  <div class="view" id="vDash">
    <div class="home-head"><div class="brand">Painel</div>
      <div class="chips"><div class="chip gold" id="dXpChip">0 XP</div></div>
    </div>
    <div class="dash" id="dash"></div>
  </div>

  <!-- ============ LESSON ============ -->
  <div class="view" id="vLesson">
    <header class="lh">
      <button class="icon-btn" id="quitBtn" aria-label="Sair da lição">✕</button>
      <div class="progress"><div id="bar"></div></div>
      <div class="xp-pill" id="xpPill">+0 XP</div>
    </header>
    <div class="lesson-tag" id="lessonTag"></div>
    <div class="chart-card" id="chartCard">
      <div class="chart-head"><span class="sym" id="chartSym"></span><span id="chartPx"></span></div>
      <canvas id="chart" height="250"></canvas>
      <div class="hint-chip" id="hint">Toca diretamente no gráfico</div>
    </div>
    <div class="question" id="qText"></div>
    <div class="options" id="opts"></div>
    <button class="cta" id="cta" disabled>Conferir</button>

    <!-- Result overlay -->
    <div class="result" id="result">
      <div class="ring">
        <svg width="140" height="140" viewBox="0 0 140 140">
          <circle cx="70" cy="70" r="60" fill="none" stroke="#243049" stroke-width="10"/>
          <circle id="ringFg" cx="70" cy="70" r="60" fill="none" stroke="#2EBD85" stroke-width="10" stroke-linecap="round" stroke-dasharray="377" stroke-dashoffset="377"/>
        </svg>
        <div class="val" id="ringVal" style="color:var(--green)">0%</div>
      </div>
      <h2 id="rTitle">Lição concluída!</h2>
      <p id="rMsg"></p>
      <div class="stats">
        <div class="stat"><b id="rXp">0</b><span>XP ganho</span></div>
        <div class="stat"><b id="rAcc">0/0</b><span>Acertos</span></div>
      </div>
      <div class="new-badge" id="newBadge" style="display:none"></div>
      <button class="cta" id="rBack">Voltar à trilha</button>
    </div>
  </div>

  <!-- ============ FEEDBACK SHEET ============ -->
  <div class="sheet" id="sheet">
    <div class="sheet-inner" id="sheetInner">
      <div class="sheet-title"><span class="badge" id="sBadge">✓</span><span id="sTitle"></span></div>
      <div class="sheet-body" id="sBody"></div>
      <div class="sheet-xp" id="sXp"></div>
      <div class="deepen" id="deepen"></div>
      <button class="cta" id="sNext">Continuar</button>
    </div>
  </div>

  <!-- ============ NAV ============ -->
  <div class="nav" id="nav">
    <button class="on" data-v="vHome"><span class="nico">🗺️</span>Trilha</button>
    <button data-v="vDash"><span class="nico">📊</span>Painel</button>
  </div>
</div>

<script>
/* ============================================================
   CENÁRIOS DE GRÁFICO — curados e anotados (expandido)
   ============================================================ */
function fromCloses(closes, firstOpen){
  return closes.map((c,i)=>{
    const o = i===0 ? firstOpen : closes[i-1];
    const h = Math.max(o,c) + 6 + (i*7)%16;
    const l = Math.min(o,c) - 6 - (i*11)%14;
    return {o,c,h,l};
  });
}
// S1 — XAUUSD 4h: alta → topo → BOS de baixa
const s1 = fromCloses([4350,4380,4360,4400,4390,4430,4410,4460,4440,4480,4530,4510,4570,4620,4590,4660,4700,4680,4740,4790,4730,4680,4665,4720,4790,4850,4900,4880,4860,4800,4750,4700,4640,4580,4560,4600,4640,4620,4655,4610,4570,4540,4560,4520,4490,4530,4510,4550],4330);
s1[26].h+=26; s1[0].l-=40;
// S2 — baixa → liquidez (equal lows) → CHOCH de alta
const s2 = fromCloses([4800,4760,4780,4720,4690,4710,4650,4600,4630,4560,4520,4480,4500,4440,4410,4430,4400,4420,4405,4400,4380,4440,4500,4560,4530,4600,4650,4620,4680,4720],4820);
s2[20].l-=14;
// S3 — consolidação (range)
const s3 = fromCloses([4600,4630,4610,4650,4620,4590,4560,4585,4615,4645,4630,4600,4570,4555,4580,4620,4640,4625,4595,4565,4575,4605,4635,4615],4590);
// S4 — anatomia das velas
const s4 = [{o:100,c:102,h:103.2,l:99},{o:102,c:101,h:103,l:100},{o:101,c:103,h:104,l:100.4},{o:103,c:109,h:109.6,l:102.7},{o:109,c:108,h:110,l:107.2},{o:108,c:108.6,h:109.4,l:107.4},{o:108.6,c:108.7,h:110.4,l:106.8},{o:108.7,c:107.2,h:109.2,l:106.3},{o:107.2,c:107.9,h:108.3,l:102.4},{o:107.9,c:109,h:109.7,l:107.1},{o:109,c:110,h:110.9,l:108.4}];
// S5 — Ombro-Cabeça-Ombro (topo de reversão)

  'rompimento-processo':{book:'Método mecânico de leitura', cite:'Processo à prova de erro: (1) marca o último swing, (2) espera o fecho além dele, (3) confirma a vela-agente. Sem adivinhação, sem reagir ao pavio.', label:'o processo de identificação', search:'how to identify break of structure step by step'}
};
function level(){ return Math.min(TITLES.length, Math.floor(state.xp/150)+1); }
function earnedBadges(){ return BADGES.filter(b=>b.cond(state)); }

/* --- Revisão espaçada: cada conceito errado entra na fila com data de retorno --- */
function scheduleReview(concept, ok){
  const r = state.review[concept] || {ease:1, next:0, seen:0};
  r.seen++;
  if(ok){ r.ease = Math.min(5, r.ease+1); }      // acertou: espaça mais
  else  { r.ease = 1; }                            // errou: volta cedo
  const days = [0,1,2,4,7][Math.min(4, r.ease-1)];
  r.next = Date.now() + days*86400000;
  if(ok && r.ease>=5) delete state.review[concept]; // dominado: sai da fila
  else state.review[concept] = r;
}
function dueConcepts(){
  const now = Date.now();
  return Object.entries(state.review).filter(([c,r])=>r.next<=now).map(([c])=>c);
}

const STORAGE_KEY = 'chartmaster-state-v1';

async function persist(){
  const payload = JSON.stringify(state);
  // 1) localStorage — funciona em qualquer browser, sobrevive a fechar/reabrir
  try{ localStorage.setItem(STORAGE_KEY, payload); }catch(e){}
  // 2) window.storage — reforço no ambiente de artefactos (se existir)
  try{ if(window.storage && window.storage.set) await window.storage.set('cm-state', payload); }catch(e){}
}

async function restore(){
  let loaded=null;
  // 1) tentar localStorage primeiro
  try{ const v=localStorage.getItem(STORAGE_KEY); if(v) loaded=JSON.parse(v); }catch(e){}
  // 2) se não houver, tentar window.storage e migrar para localStorage
  if(!loaded){
    try{
      if(window.storage && window.storage.get){
        const r=await window.storage.get('cm-state');
        if(r && r.value){ loaded=JSON.parse(r.value); }
      }
    }catch(e){}
  }
  if(loaded) state = Object.assign(state, loaded);

  const today = dayStr();
  if(state.lastDay !== today){
    const diff = (new Date(today) - new Date(state.lastDay)) / 86400000;
    state.streak = diff === 1 ? state.streak+1 : 1;
    state.lastDay = today;
  }
  if(state.missionDay !== today){ state.missionDay = today; state.missionDone = false; }
  persist();
}

/* --- Exportar / importar progresso (para mudar de dispositivo sem servidor) --- */
function exportProgress(){
  const code = btoa(unescape(encodeURIComponent(JSON.stringify(state))));
  return code;
}
function importProgress(code){
  try{
    const obj = JSON.parse(decodeURIComponent(escape(atob(code.trim()))));
    if(!obj || typeof obj!=='object') throw 0;
    state = Object.assign({xp:0,streak:1,lastDay:dayStr(),done:{},attempts:[],perfects:0,
      review:{},reviewsDone:0,missionsDone:0,missionDay:'',missionDone:false,inProgress:null}, obj);
    persist();
    return true;
  }catch(e){ return false; }
}

/* ============================================================
   CHART RENDERER
   ============================================================ */
const cv = document.getElementById('chart');
const ctx = cv.getContext('2d');
const PAD = {t:16, r:56, b:12, l:8};
let cur=null, pMin=0, pMax=1, W=0, H=0;
let userMark=null, revealQ=null, revealAnim=0;
let animUpTo=-1;          // -1 = mostrar todas; >=0 = revelar até este índice (animação)
let animTimer=null;

function setScenario(key){
  cur = SCENARIOS[key];
  pMin = Math.min(...cur.candles.map(k=>k.l));
  pMax = Math.max(...cur.candles.map(k=>k.h));
  const pad=(pMax-pMin)*0.06; pMin-=pad; pMax+=pad;
  document.getElementById('chartSym').textContent = cur.sym;
  const px = document.getElementById('chartPx');
  px.textContent = cur.px; px.style.color = cur.pxColor;
}
function resize(){
  if(!cur) return;
  const dpr = window.devicePixelRatio||1;
  W = cv.clientWidth; H = cv.clientHeight;
  if(W===0) return;
  cv.width=W*dpr; cv.height=H*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  draw();
}
const x = i => PAD.l + (i+0.5)*(W-PAD.l-PAD.r)/cur.candles.length;
const y = p => PAD.t + (pMax-p)*(H-PAD.t-PAD.b)/(pMax-pMin);
const iAt = px => Math.round((px-PAD.l)/((W-PAD.l-PAD.r)/cur.candles.length) - 0.5);
const pAt = py => pMax - (py-PAD.t)*(pMax-pMin)/(H-PAD.t-PAD.b);

function fmt(p){ return p>=1000 ? Math.round(p).toLocaleString('pt') : (Math.round(p*10)/10); }

function draw(){
  if(!cur||!W) return;
  ctx.clearRect(0,0,W,H);
  const mono = getComputedStyle(document.documentElement).getPropertyValue('--mono');

  // grade
  const range=pMax-pMin, rawStep=range/4;
  const mag=Math.pow(10,Math.floor(Math.log10(rawStep)));
  const step=Math.ceil(rawStep/mag)*mag;
  ctx.font='10px '+mono; ctx.textAlign='left'; ctx.textBaseline='middle';
  for(let p=Math.ceil(pMin/step)*step; p<pMax; p+=step){
    ctx.strokeStyle='rgba(36,48,73,.55)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(PAD.l,y(p)); ctx.lineTo(W-PAD.r,y(p)); ctx.stroke();
    ctx.fillStyle='#8B94AB'; ctx.fillText(fmt(p), W-PAD.r+8, y(p));
  }

  // reveal (zona correta + anotações)
  if(revealQ && revealQ.zone){
    const z=revealQ.zone;
    const zx=x(z.i1)-7, zw=x(z.i2)-x(z.i1)+14;
    const zy=y(z.p2), zh=y(z.p1)-y(z.p2);
    ctx.fillStyle=`rgba(232,179,61,${0.10+0.08*Math.sin(revealAnim)})`;
    ctx.fillRect(zx,zy,zw,zh);
    ctx.strokeStyle='rgba(232,179,61,.85)'; ctx.setLineDash([5,4]); ctx.lineWidth=1.5;
    ctx.strokeRect(zx,zy,zw,zh); ctx.setLineDash([]);
    const r=revealQ.reveal||{};
    if(r.hline){
      ctx.strokeStyle='rgba(246,70,93,.9)'; ctx.setLineDash([6,5]); ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(x(r.hline.i1)-8,y(r.hline.price)); ctx.lineTo(x(r.hline.i2),y(r.hline.price)); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle='#F6465D'; ctx.font='bold 10px Inter,sans-serif'; ctx.textAlign='left';
      ctx.fillText(r.hline.label, x(r.hline.i1)-8, y(r.hline.price)-8);
    }
    if(r.label){
      ctx.fillStyle='#E8B33D'; ctx.font='bold 11px Inter,sans-serif'; ctx.textAlign='center';
      ctx.fillText(r.label, zx+zw/2, Math.min(H-8, zy+zh+14));
    }
  }

  // velas (respeitando a animação progressiva)
  const bw=Math.max(3,(W-PAD.l-PAD.r)/cur.candles.length*0.62);
  const lastVisible = animUpTo<0 ? cur.candles.length-1 : animUpTo;
  cur.candles.forEach((k,i)=>{
    if(i>lastVisible) return;                       // ainda não revelada
    const col = k.c>=k.o ? '#2EBD85' : '#F6465D';
    const isNewest = (animUpTo>=0 && i===lastVisible);  // vela a "entrar" agora
    ctx.globalAlpha = isNewest ? 0.6+0.4*Math.abs(Math.sin(revealAnim*1.5)) : 1;
    ctx.strokeStyle=col; ctx.lineWidth= isNewest?1.6:1;
    ctx.beginPath(); ctx.moveTo(x(i),y(k.h)); ctx.lineTo(x(i),y(k.l)); ctx.stroke();
    ctx.fillStyle=col;
    const top=y(Math.max(k.o,k.c)), bot=y(Math.min(k.o,k.c));
    ctx.fillRect(x(i)-bw/2, top, bw, Math.max(1.5,bot-top));
    ctx.globalAlpha=1;
  });

  // marca do aluno
  if(userMark){
    const mx=x(userMark.i), my=y(userMark.price);
    ctx.beginPath(); ctx.arc(mx,my,9,0,Math.PI*2);
    ctx.strokeStyle='#E8B33D'; ctx.lineWidth=2; ctx.stroke();
    ctx.beginPath(); ctx.arc(mx,my,3,0,Math.PI*2); ctx.fillStyle='#E8B33D'; ctx.fill();
  }
}
window.addEventListener('resize', resize);

function startReveal(q){
  revealQ=q;
  if(window.matchMedia('(prefers-reduced-motion: reduce)').matches){ draw(); return; }
  let t0=null;
  (function loop(ts){
    if(!t0)t0=ts;
    revealAnim=(ts-t0)/400; draw();
    if(ts-t0<2400) requestAnimationFrame(loop);
  })(performance.now());
}

/* Animação progressiva: revela as velas uma a uma (efeito "replay") */
function playAnim(key){
  setScenario(key);
  if(animTimer){ clearInterval(animTimer); animTimer=null; }
  const n = cur.candles.length;
  if(window.matchMedia('(prefers-reduced-motion: reduce)').matches){ animUpTo=-1; requestAnimationFrame(resize); return; }
  animUpTo=0;
  requestAnimationFrame(resize);
  // loop de "respiração" para a vela mais recente
  let raf=null;
  (function breathe(ts){ revealAnim=ts/300; if(animUpTo>=0 && animUpTo<n){ draw(); raf=requestAnimationFrame(breathe);} })(0);
  animTimer=setInterval(()=>{
    animUpTo++;
    if(animUpTo>=n-1){
      animUpTo=n-1;
      clearInterval(animTimer); animTimer=null;
      if(raf) cancelAnimationFrame(raf);
      setTimeout(()=>{ animUpTo=-1; draw(); }, 600); // fixa todas no fim
    }
    draw();
  }, 380);
}

/* ============================================================
   LESSON ENGINE
   ============================================================ */
const $=id=>document.getElementById(id);
let curMod=null, qi=0, lessonXp=0, lessonCorrect=0, selected=null, answered=false;
let lessonKind='module';   // module | review | mission | exam

// Atribuir um ID estável a cada questão (para memória e variação)
(function tagQuestions(){
  MODULES.forEach(m=>m.questions.forEach((q,i)=>{ q._qid = m.id+'-'+i; }));
})();

// Banco global de questões (todas as questões de todos os níveis)
function allQuestions(){
  const bank=[];
  MODULES.forEach(m=>m.questions.forEach(q=>bank.push(q)));
  return bank;
}
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function startLesson(mod, kind){
  curMod=mod; qi=0; lessonXp=0; lessonCorrect=0;
  lessonKind = kind || 'module';
  $('lessonTag').innerHTML = `${mod.icon} <b>${mod.title}</b>`;
  $('result').classList.remove('show');
  showView('vLesson', true);
  loadQ();
}

// Iniciar (ou repetir) um nível. Na repetição, a ordem é baralhada e
// reforçada com questões de revisão do mesmo nível para variar.
function startModule(mod){
  const isRepeat = !!state.done[mod.id];
  let qs;
  if(isRepeat){
    // ordem baralhada; injeta variação trazendo questões do banco do mesmo conceito
    qs = shuffle(mod.questions);
  }else{
    qs = mod.questions.slice();  // 1ª vez: ordem pedagógica original
  }
  startLesson({id:mod.id, icon:mod.icon, title:mod.title, questions:qs}, 'module');
}

// Revisão espaçada: monta uma lição com conceitos vencidos (ou erros recentes)
function startReview(){
  let due = dueConcepts();
  if(!due.length){
    const wrong = [...new Set(state.attempts.filter(a=>!a.ok).slice(-40).map(a=>a.c))];
    due = wrong;
  }
  const bank = allQuestions().filter(q=>due.includes(q.c));
  const qs = shuffle(bank).slice(0,8);
  if(!qs.length){
    alert('Ainda não há nada para rever — completa algumas lições primeiro! 📈');
    return;
  }
  startLesson({id:'__review', icon:'🔁', title:'Revisão Espaçada', questions:qs}, 'review');
}

// Missão diária: 5 questões aleatórias do banco (varia a cada dia/abertura)
function startMission(){
  const qs = shuffle(allQuestions()).slice(0,5);
  startLesson({id:'__mission', icon:'📅', title:'Missão Diária', questions:qs}, 'mission');
}

// Avaliação cumulativa de um nível já desbloqueado (questões baralhadas)
function startExam(mod){
  const qs = shuffle(mod.questions).slice(0, Math.min(8, mod.questions.length));
  startLesson({id:'__exam_'+mod.id, icon:'📝', title:'Avaliação · '+mod.title.replace(/^N\d+ · /,''), questions:qs, examOf:mod.id}, 'exam');
}

function loadQ(){
  const q=curMod.questions[qi];
  answered=false; selected=null; userMark=null; revealQ=null; animUpTo=-1;
  if(animTimer){ clearInterval(animTimer); animTimer=null; }
  $('bar').style.width=(qi/curMod.questions.length*100)+'%';
  $('xpPill').textContent='+'+lessonXp+' XP';
  $('qText').innerHTML=q.prompt+(q.sub?`<small>${q.sub}</small>`:'');
  const opts=$('opts'); opts.innerHTML='';
  $('cta').disabled=true;

  const hasChart = !!(q.scenario || q.anim);
  $('chartCard').style.display = hasChart?'block':'none';
  if(q.anim){
    playAnim(q.anim);                 // animação progressiva (replay)
  }else if(q.scenario){
    setScenario(q.scenario);
    requestAnimationFrame(resize);
  }
  cv.classList.toggle('clickable', q.type==='click');
  $('hint').classList.toggle('show', q.type==='click');

  // ---- Opções embaralhadas (posição da resposta certa é aleatória) ----
  if(q.options){
    // Para V/F mantemos a ordem natural; para o resto, baralhamos.
    const isTF = q.options.length===2 && /verdadeiro/i.test(q.options[0]);
    let order = q.options.map((_,i)=>i);
    if(!isTF) order = shuffle(order);
    q._order = order;                          // guardar para corrigir e persistir
    q._correctPos = order.indexOf(q.answer);   // nova posição da resposta certa
    order.forEach((origIdx,pos)=>{
      const b=document.createElement('button');
      b.className='opt';
      b.innerHTML=`<span class="key">${String.fromCharCode(65+pos)}</span><span>${q.options[origIdx]}</span>`;
      b.dataset.orig=origIdx;
      b.onclick=()=>{
        if(answered)return;
        selected=origIdx;                      // selected guarda o índice ORIGINAL
        [...opts.children].forEach(c=>c.classList.toggle('selected', +c.dataset.orig===origIdx));
        $('cta').disabled=false;
      };
      opts.appendChild(b);
    });
  }
  saveLessonProgress();
}

cv.addEventListener('pointerdown', e=>{
  if(!curMod)return;
  const q=curMod.questions[qi];
  if(q.type!=='click'||answered)return;
  const r=cv.getBoundingClientRect();
  const i=iAt(e.clientX-r.left), price=pAt(e.clientY-r.top);
  if(i<0||i>=cur.candles.length)return;
  userMark={i,price};
  $('hint').classList.remove('show');
  $('cta').disabled=false;
  draw();
});

function grade(q){
  if(q.type==='click'){
    const z=q.zone;
    return userMark.i>=z.i1 && userMark.i<=z.i2 && userMark.price>=z.p1 && userMark.price<=z.p2;
  }
  return selected===q.answer;
}

$('cta').onclick=()=>{
  if(answered||!curMod)return;
  answered=true;
  const q=curMod.questions[qi];
  const ok=grade(q);
  if(ok){lessonCorrect++; lessonXp+=10; $('xpPill').textContent='+'+lessonXp+' XP';}
  state.attempts.push({c:q.c, ok});
  if(state.attempts.length>600) state.attempts=state.attempts.slice(-600);
  scheduleReview(q.c, ok);
  if(lessonKind==='review' && ok) state.reviewsDone=(state.reviewsDone||0)+1;

  if(q.options){
    [...$('opts').children].forEach(c=>{
      c.disabled=true;
      const orig=+c.dataset.orig;
      if(orig===q.answer)c.classList.add('correct');           // a certa, onde quer que tenha caído
      else if(orig===selected&&!ok)c.classList.add('wrong');
    });
  }
  if(q.type==='click') startReveal(q);

  const inner=$('sheetInner');
  inner.className='sheet-inner '+(ok?'ok':'bad');
  $('sBadge').textContent=ok?'✓':'✕';
  $('sTitle').textContent=ok?'Correto!':'Ainda não…';
  $('sBody').innerHTML=ok?q.ok:q.bad;
  $('sXp').textContent=ok?'+10 XP':'+0 XP · este conceito volta na tua revisão';

  // ---- Botão "Aprofundar" com fonte/citação ----
  buildDeepen(q);

  $('sNext').textContent = qi<curMod.questions.length-1?'Continuar':'Ver resultado';
  setTimeout(()=>$('sheet').classList.add('show'), q.type==='click'?850:330);
};

/* Constrói a secção "Aprofundar" do feedback com base na fonte do conceito */
function buildDeepen(q){
  const box=$('deepen'); if(!box) return;
  const src = SOURCES[q.c] || SOURCES['_default'];
  const query = encodeURIComponent((src.search||q.c)+' trading price action');
  box.innerHTML = `
    <button class="deepen-toggle" id="deepBtn">📚 Aprofundar este tema</button>
    <div class="deepen-body" id="deepBody" hidden>
      ${src.cite?`<p class="cite">📖 <b>${src.book}</b>${src.chapter?' · '+src.chapter:''}<br><span>${src.cite}</span></p>`:''}
      <a class="deep-link" href="https://www.google.com/search?q=${query}" target="_blank" rel="noopener">🔎 Pesquisar mais sobre "${src.label||q.c}"</a>
    </div>`;
  const btn=$('deepBtn'), body=$('deepBody');
  if(btn) btn.onclick=()=>{ body.hidden=!body.hidden; btn.classList.toggle('open', !body.hidden); };
}

$('sNext').onclick=()=>{
  $('sheet').classList.remove('show');
  revealQ=null;
  qi++;
  if(qi<curMod.questions.length){ saveLessonProgress(); setTimeout(loadQ,300); }
  else{ clearLessonProgress(); $('bar').style.width='100%'; setTimeout(finishLesson,350); }
};

$('quitBtn').onclick=()=>{ $('sheet').classList.remove('show'); saveLessonProgress(); showView('vHome'); };

/* ---- Memória de progresso a meio de uma lição ---- */
function saveLessonProgress(){
  if(!curMod || lessonKind!=='module') return;   // só guardamos lições de nível
  state.inProgress = {
    modId: curMod.id, qi, lessonXp, lessonCorrect,
    order: curMod.questions.map(q=>q._qid)        // ordem exata das questões desta sessão
  };
  persist();
}
function clearLessonProgress(){
  if(state.inProgress){ delete state.inProgress; persist(); }
}
function resumeLesson(){
  const ip = state.inProgress;
  if(!ip) return false;
  const mod = MODULES.find(m=>m.id===ip.modId);
  if(!mod){ clearLessonProgress(); return false; }
  // reconstruir a mesma ordem de questões guardada
  let qs;
  if(ip.order && ip.order.every(id=>id!=null)){
    const byId={}; mod.questions.forEach(q=>byId[q._qid]=q);
    qs = ip.order.map(id=>byId[id]).filter(Boolean);
  }
  if(!qs || qs.length!==mod.questions.length) qs = mod.questions; // fallback
  curMod = {id:mod.id, icon:mod.icon, title:mod.title, questions:qs};
  qi = Math.min(ip.qi||0, qs.length-1);
  lessonXp = ip.lessonXp||0; lessonCorrect = ip.lessonCorrect||0;
  lessonKind='module';
  $('lessonTag').innerHTML = `${mod.icon} <b>${mod.title}</b>`;
  $('result').classList.remove('show');
  showView('vLesson', true);
  loadQ();
  return true;
}

function finishLesson(){
  const total=curMod.questions.length;
  const acc=Math.round(lessonCorrect/total*100);
  const passed=acc>=70;
  const before=earnedBadges().map(b=>b.id);

  state.xp+=lessonXp;
  if(acc===100 && lessonKind==='module') state.perfects++;

  if(lessonKind==='module'){
    const prev=state.done[curMod.id];
    if(passed && (!prev || acc>prev.acc)) state.done[curMod.id]={acc};
  } else if(lessonKind==='mission' && !state.missionDone){
    state.missionDone=true; state.missionsDone=(state.missionsDone||0)+1;
  }
  persist();

  const after=earnedBadges();
  const fresh=after.filter(b=>!before.includes(b.id));

  $('result').classList.add('show');
  let title, msg;
  if(lessonKind==='module'){
    title = passed ? 'Nível dominado! 🏅' : 'Quase lá! 💪';
    const nextExists = MODULES[MODULES.findIndex(m=>m.id===curMod.id)+1];
    msg = passed
      ? `Concluíste <b style="color:var(--text)">${curMod.title}</b>${state.done[curMod.id]&&nextExists?' — o próximo nível foi desbloqueado':''}.`
      : `Precisas de pelo menos <b style="color:var(--text)">70%</b> para desbloquear o próximo nível. Revê e tenta de novo!`;
  } else if(lessonKind==='review'){
    title = '🔁 Revisão concluída!';
    msg = `Reforçaste conceitos que tinhas errado. Acertar agora afasta-os na fila de revisão — errar traz-nos de volta amanhã.`;
  } else if(lessonKind==='mission'){
    title = '📅 Missão diária feita!';
    msg = `Mantém a tua sequência viva: 🔥 <b style="color:var(--text)">${state.streak}</b> ${state.streak===1?'dia':'dias'}. Volta amanhã para uma nova missão.`;
  } else {
    title = passed ? '📝 Avaliação passada!' : '📝 Avaliação não passada';
    msg = passed ? `Mostraste domínio cumulativo deste nível. Bom trabalho!` : `Não atingiste 70%. Revê o nível e repete a avaliação quando estiveres pronto.`;
  }
  $('rTitle').textContent = title;
  $('rMsg').innerHTML = msg;
  $('rXp').textContent=lessonXp;
  $('rAcc').textContent=lessonCorrect+'/'+total;
  $('ringVal').style.color = passed?'var(--green)':'var(--red)';
  const ring=$('ringFg');
  ring.style.stroke = passed?'#2EBD85':'#F6465D';
  ring.style.transition='none'; ring.style.strokeDashoffset=377;
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    ring.style.transition='stroke-dashoffset 1s cubic-bezier(.2,.8,.2,1)';
    ring.style.strokeDashoffset=377-(377*acc/100);
  }));
  let v=0; const t=setInterval(()=>{
    v+=4; if(v>=acc){v=acc;clearInterval(t);}
    $('ringVal').textContent=v+'%';
  },25);

  const nb=$('newBadge');
  if(fresh.length){ nb.style.display='block'; nb.textContent='🎉 Nova medalha: '+fresh.map(b=>b.icon+' '+b.name).join(' · '); }
  else nb.style.display='none';
}
$('rBack').onclick=()=>{ showView('vHome'); };

/* ============================================================
   HOME / TRILHA
   ============================================================ */
function renderHome(){
  $('hStreak').textContent=state.streak;
  $('hXp').textContent=state.xp+' XP';
  const lvl=level();
  $('hLvl').textContent=lvl;
  $('hTitle').textContent=TITLES[lvl-1];
  $('hLvlBar').style.width=((state.xp%150)/150*100)+'%';

  const track=$('track'); track.innerHTML='';

  // --- Cartão "Continuar lição" (memória a meio) ---
  if(state.inProgress){
    const ip=state.inProgress;
    const mod=MODULES.find(m=>m.id===ip.modId);
    if(mod){
      const total=mod.questions.length;
      const cont=document.createElement('button');
      cont.className='resume';
      cont.innerHTML=`
        <div class="ri">▶️</div>
        <div class="rinfo"><h4>Continuar onde paraste</h4>
        <p>${mod.title} · questão ${Math.min((ip.qi||0)+1,total)} de ${total}</p>
        <div class="rbar"><div style="width:${(ip.qi||0)/total*100}%"></div></div></div>`;
      cont.onclick=()=>resumeLesson();
      track.appendChild(cont);
    }
  }

  // --- Cartões de prática diária (missão + revisão) ---
  const due = dueConcepts().length;
  const daily=document.createElement('div');
  daily.className='daily-row';
  daily.innerHTML=`
    <button class="daily ${state.missionDone?'done':''}" id="missionCard">
      <div class="di">📅</div>
      <div><h4>Missão diária</h4><p>${state.missionDone?'Concluída hoje ✓':'5 questões · +50 XP'}</p></div>
    </button>
    <button class="daily" id="reviewCard">
      <div class="di">🔁</div>
      <div><h4>Revisão</h4><p>${due?due+' conceito'+(due>1?'s':'')+' a rever':'Reforçar erros'}</p></div>
    </button>`;
  track.appendChild(daily);

  // --- Trilha de níveis ---
  let unlockedUpTo=0;
  MODULES.forEach((m,i)=>{ if(state.done[m.id]) unlockedUpTo=Math.max(unlockedUpTo,i+1); });

  MODULES.forEach((m,i)=>{
    const done=state.done[m.id];
    const locked=i>unlockedUpTo;
    const b=document.createElement('button');
    b.className='mod '+(done?'done':locked?'locked':'avail');
    b.innerHTML=`
      <div class="ico">${done?'✅':locked?'🔒':m.icon}</div>
      <div class="info"><h3>${m.title}</h3><p>${m.desc}</p>${done?'<span class="exam-link">📝 refazer avaliação</span>':''}</div>
      <div class="st">${done?done.acc+'%':locked?'bloqueado':'começar →'}</div>`;
    if(!locked){
      b.onclick=(e)=>{
        if(e.target.classList.contains('exam-link')){ startExam(m); }
        else startModule(m);
      };
    }
    track.appendChild(b);
  });

  $('missionCard').onclick=()=>{ if(!state.missionDone) startMission(); };
  $('reviewCard').onclick=startReview;
}

/* ============================================================
   DASHBOARD
   ============================================================ */
function renderDash(){
  $('dXpChip').textContent=state.xp+' XP';
  const d=$('dash');
  const total=state.attempts.length;
  const okN=state.attempts.filter(a=>a.ok).length;
  const acc=total?Math.round(okN/total*100):0;
  const doneN=Object.keys(state.done).length;

  // por conceito
  const byC={};
  state.attempts.forEach(a=>{
    byC[a.c]=byC[a.c]||{n:0,ok:0};
    byC[a.c].n++; if(a.ok)byC[a.c].ok++;
  });
  const concepts=Object.entries(byC).sort((a,b)=>b[1].n-a[1].n).slice(0,10);

  const earned=earnedBadges().map(b=>b.id);

  d.innerHTML=`
    <div class="dgrid">
      <div class="dcard"><b>${acc}%</b><span>Precisão geral</span></div>
      <div class="dcard"><b>${doneN}/10</b><span>Módulos dominados</span></div>
      <div class="dcard"><b>${total}</b><span>Exercícios feitos</span></div>
      <div class="dcard"><b>🔥 ${state.streak}</b><span>Dias seguidos</span></div>
    </div>
    <div class="sect">Domínio por conceito</div>
    ${concepts.length ? concepts.map(([c,v])=>{
      const p=Math.round(v.ok/v.n*100);
      const col=p>=80?'var(--green)':p>=50?'var(--gold)':'var(--red)';
      return `<div class="cbar"><span class="nm">${c}</span><div class="tr"><div style="width:${p}%;background:${col}"></div></div><span class="pc">${p}%</span></div>`;
    }).join('') : '<div class="empty">Completa a tua primeira lição para veres o teu domínio por conceito aqui. 📈</div>'}
    <div class="sect">Medalhas</div>
    <div class="badges">
      ${BADGES.map(b=>`<div class="bdg ${earned.includes(b.id)?'earned':''}"><span class="bi">${b.icon}</span><span class="bn">${b.name}</span></div>`).join('')}
    </div>
    <div class="sect">Guardar / transferir progresso</div>
    <div class="sync">
      <p class="sync-note">O teu progresso fica guardado neste browser automaticamente. Para o levar para <b>outro dispositivo</b>, copia o teu código aqui e cola-o no outro aparelho.</p>
      <div class="sync-row">
        <button class="sync-btn" id="btnExport">📤 Copiar o meu código</button>
        <button class="sync-btn" id="btnImport">📥 Colar código</button>
      </div>
      <textarea class="sync-box" id="syncBox" placeholder="O teu código de progresso aparece aqui ao exportar — ou cola aqui um código e toca em Aplicar." spellcheck="false"></textarea>
      <button class="sync-apply" id="btnApply" hidden>✅ Aplicar código colado</button>
    </div>`;

  // handlers de sincronização
  const box=$('syncBox');
  $('btnExport').onclick=()=>{
    box.value=exportProgress();
    box.select();
    try{ document.execCommand('copy'); }catch(e){}
    $('btnExport').textContent='✓ Copiado!';
    setTimeout(()=>$('btnExport').textContent='📤 Copiar o meu código',1800);
  };
  $('btnImport').onclick=()=>{ box.value=''; box.placeholder='Cola aqui o código do outro dispositivo…'; box.focus(); $('btnApply').hidden=false; };
  $('btnApply').onclick=()=>{
    if(importProgress(box.value)){ alert('Progresso importado com sucesso! 🎉'); renderHome(); renderDash(); }
    else alert('Código inválido. Verifica se copiaste o código completo.');
  };
}

/* ============================================================
   NAVEGAÇÃO
   ============================================================ */
function showView(id, isLesson){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  $(id).classList.add('active');
  $('nav').style.display = isLesson?'none':'flex';
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on', b.dataset.v===id));
  if(id==='vHome') renderHome();
  if(id==='vDash') renderDash();
}
document.querySelectorAll('#nav button').forEach(b=>{
  b.onclick=()=>showView(b.dataset.v);
});

/* ============================================================
   INIT
   ============================================================ */
(async function(){
  await restore();
  renderHome();
})();
</script>
